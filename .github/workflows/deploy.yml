name: Freenet Deploy

on:
  push:
    branches:
      - main  # Deploy when pushing to main
  pull_request:
    branches:
      - main
  workflow_dispatch:  # Manual trigger from the Actions tab, e.g. to refresh
                     # the whitepaper PDF after a paper-1 release without
                     # needing a code change in this repo.

env:
  # Opt the Node 20-targeting actions (checkout, cache, upload-artifact)
  # into Node.js 24 ahead of the September 2026 forced cutover. Silences
  # the deprecation warning on every run.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      # Checkout the repository
      - uses: actions/checkout@v4
        with:
          submodules: true  # Fetch Hugo themes (true OR recursive)
          fetch-depth: 0    # Fetch all history for .GitInfo and .Lastmod

      # Setup Hugo for static site generation
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.146.4'
          extended: true

      # Setup Rust environment
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Add WebAssembly target for Rust
      - name: Add WebAssembly target
        run: rustup target add wasm32-unknown-unknown

      # Install WebAssembly tools
      - name: Install wasm-pack and wasm-bindgen-cli
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          cargo install --force wasm-pack
          cargo install --force wasm-bindgen-cli

      # Install cargo-make for building
      - name: Install cargo-make
        run: cargo install --debug cargo-make

      # Cache WebAssembly files
      - name: Cache WebAssembly files
        id: cache-wasm
        uses: actions/cache@v3
        with:
          path: hugo-site/static/wasm
          key: ${{ runner.os }}-wasm-${{ hashFiles('rust/gkwasm/**', 'rust/gklib/**') }}

      # Build WebAssembly if cache miss or files changed
      - name: Build WebAssembly
        if: steps.cache-wasm.outputs.cache-hit != 'true'
        run: cargo make build-wasm-release

      # Refresh whitepaper PDF from the paper-1 'latest' release so the
      # deployed PDF always matches the most recent successful build of
      # github.com/freenet/paper-1. A download failure falls back to the
      # committed snapshot under hugo-site/static/pdf/ so deploy never
      # blocks on the paper repo.
      - name: Refresh whitepaper PDF
        run: |
          set -u
          url="https://github.com/freenet/paper-1/releases/latest/download/freenet-whitepaper.pdf"
          tmp="$(mktemp)"
          if curl -L --fail --silent --show-error -o "$tmp" "$url"; then
            mv "$tmp" hugo-site/static/pdf/freenet-whitepaper.pdf
            echo "Refreshed whitepaper PDF from paper-1 latest release."
          else
            rm -f "$tmp"
            echo "::warning::Could not fetch whitepaper PDF; using committed snapshot."
          fi

      # Build the site using cargo-make
      - name: Build Site
        run: cargo make build-site

      # Verify the contents of the build
      - name: Verify WebAssembly files in build
        run: |
          echo "Contents of hugo-site/public/wasm:"
          ls -la hugo-site/public/wasm

      # Upload the built site to GitHub Pages artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: hugo-site/public

  deploy:
    needs: build
    # Run on push to main, or on manual workflow_dispatch
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-22.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
