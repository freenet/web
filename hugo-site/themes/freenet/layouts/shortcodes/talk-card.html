{{- $id := .Get "id" -}}
{{- $title := .Get "title" -}}
{{- $href := .Get "href" | default (printf "https://www.youtube.com/watch?v=%s" $id) -}}
{{- $caption := .Get "caption" -}}
<a class="talk-card" href="{{ $href }}"{{ if hasPrefix $href "http" }} target="_blank" rel="noopener"{{ end }} aria-label="Watch: {{ $title }}">
  <div class="talk-card-thumb">
    <img src="https://i.ytimg.com/vi/{{ $id }}/hqdefault.jpg"
         alt="{{ $title }} (YouTube thumbnail)"
         loading="lazy"
         width="480" height="360">
    <span class="talk-card-play" aria-hidden="true">
      <svg viewBox="0 0 68 48" width="68" height="48">
        <path d="M66.52 7.74c-.78-2.93-2.49-5.41-5.42-6.19C55.79.13 34 0 34 0S12.21.13 6.9 1.55c-2.93.78-4.63 3.26-5.42 6.19C.06 13.05 0 24 0 24s.06 10.95 1.48 16.26c.78 2.93 2.49 5.41 5.42 6.19C12.21 47.87 34 48 34 48s21.79-.13 27.1-1.55c2.93-.78 4.64-3.26 5.42-6.19C67.94 34.95 68 24 68 24s-.06-10.95-1.48-16.26z" fill="#f00"/>
        <path d="M45 24 27 14v20" fill="#fff"/>
      </svg>
    </span>
  </div>
  <div class="talk-card-meta">
    <strong class="talk-card-title">{{ $title }}</strong>
    {{ with $caption }}<span class="talk-card-caption">{{ . }}</span>{{ end }}
  </div>
</a>
