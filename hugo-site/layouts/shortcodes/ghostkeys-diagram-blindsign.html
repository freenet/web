<figure class="gk-diagram">
  <svg class="gk-svg gk-wide" viewBox="0 0 900 380" role="img" aria-label="Blind signing flow">
    <defs>
      <marker id="gk-arrow1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="currentColor"/>
      </marker>
      <marker id="gk-arrow1-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--gk-accent)"/>
      </marker>
    </defs>

    <rect class="gk-box" x="60"  y="80" width="240" height="120" rx="10"/>
    <text class="gk-label" x="180" y="115" text-anchor="middle">Your browser</text>
    <text class="gk-small" x="180" y="145" text-anchor="middle">generates a keypair</text>
    <text class="gk-small" x="180" y="165" text-anchor="middle">(public + private)</text>
    <text class="gk-mono"  x="180" y="188" text-anchor="middle">blinds the public key</text>

    <rect class="gk-box" x="600" y="80" width="240" height="120" rx="10"/>
    <text class="gk-label" x="720" y="115" text-anchor="middle">Donation server</text>
    <text class="gk-small" x="720" y="145" text-anchor="middle">verifies the donation</text>
    <text class="gk-small" x="720" y="165" text-anchor="middle">signs the blinded key</text>
    <text class="gk-mono"  x="720" y="188" text-anchor="middle">never sees the real key</text>

    <line class="gk-line" x1="310" y1="120" x2="590" y2="120" marker-end="url(#gk-arrow1)"/>
    <text class="gk-mono" x="450" y="108" text-anchor="middle">blinded( public key )</text>

    <line class="gk-line-accent" x1="590" y1="160" x2="310" y2="160" marker-end="url(#gk-arrow1-accent)"/>
    <text class="gk-mono gk-accent-text" x="450" y="180" text-anchor="middle">blind signature</text>

    <line class="gk-line gk-dashed" x1="180" y1="200" x2="180" y2="250"/>
    <text class="gk-small" x="195" y="228" text-anchor="start">browser unblinds</text>

    <rect class="gk-box-accent" x="60" y="250" width="240" height="80" rx="10"/>
    <text class="gk-label gk-accent-text" x="180" y="280" text-anchor="middle">Ghost Key certificate</text>
    <text class="gk-small" x="180" y="302" text-anchor="middle">proves a donation —</text>
    <text class="gk-small" x="180" y="318" text-anchor="middle">not who made it</text>
  </svg>

  <svg class="gk-svg gk-narrow" viewBox="0 0 360 640" role="img" aria-label="Blind signing flow (stacked)">
    <defs>
      <marker id="gk-arrow1n" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="currentColor"/>
      </marker>
      <marker id="gk-arrow1n-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--gk-accent)"/>
      </marker>
    </defs>

    <rect class="gk-box" x="40" y="20" width="280" height="120" rx="10"/>
    <text class="gk-label" x="180" y="55" text-anchor="middle">Your browser</text>
    <text class="gk-small" x="180" y="82" text-anchor="middle">generates a keypair</text>
    <text class="gk-small" x="180" y="102" text-anchor="middle">blinds the public key</text>

    <line class="gk-line" x1="180" y1="140" x2="180" y2="200" marker-end="url(#gk-arrow1n)"/>
    <text class="gk-mono" x="190" y="175" text-anchor="start">blinded pubkey</text>

    <rect class="gk-box" x="40" y="200" width="280" height="130" rx="10"/>
    <text class="gk-label" x="180" y="235" text-anchor="middle">Donation server</text>
    <text class="gk-small" x="180" y="262" text-anchor="middle">verifies the donation</text>
    <text class="gk-small" x="180" y="282" text-anchor="middle">signs the blinded key</text>
    <text class="gk-small" x="180" y="308" text-anchor="middle">never sees the real key</text>

    <line class="gk-line-accent" x1="180" y1="330" x2="180" y2="390" marker-end="url(#gk-arrow1n-accent)"/>
    <text class="gk-mono gk-accent-text" x="190" y="365" text-anchor="start">blind signature</text>

    <rect class="gk-box" x="40" y="390" width="280" height="90" rx="10"/>
    <text class="gk-label" x="180" y="425" text-anchor="middle">Browser unblinds</text>
    <text class="gk-small" x="180" y="452" text-anchor="middle">produces a signed</text>
    <text class="gk-small" x="180" y="472" text-anchor="middle">public key</text>

    <line class="gk-line gk-dashed" x1="180" y1="480" x2="180" y2="520"/>

    <rect class="gk-box-accent" x="40" y="520" width="280" height="100" rx="10"/>
    <text class="gk-label gk-accent-text" x="180" y="555" text-anchor="middle">Ghost Key certificate</text>
    <text class="gk-small" x="180" y="582" text-anchor="middle">proves a donation —</text>
    <text class="gk-small" x="180" y="602" text-anchor="middle">not who made it</text>
  </svg>

  <figcaption>The public key is blinded before leaving the browser, so the donation server can authorize the donation and sign without ever learning which key it is signing. Unblinding yields a certificate the server cannot link to the donor.</figcaption>
</figure>
